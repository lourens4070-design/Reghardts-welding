<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reghardt's Welding</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* GENERAL STYLES */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body { line-height: 1.6; color: #333; }
        a { text-decoration: none; color: inherit; }
        img { max-width: 100%; display: block; }

        /* NAVIGATION */
        header { background: #222; color: #fff; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        header h1 { font-size: 1.8rem; }
        nav a { margin-left: 1.5rem; font-weight: bold; color: #fff; transition: color 0.3s; }
        nav a:hover { color: #f39c12; }

        /* SECTIONS */
        section { padding: 4rem 2rem; }
        section h2 { font-size: 2.2rem; text-align: center; margin-bottom: 2rem; color: #222; }
        .about, .services, .gallery, .testimonials, .contact { max-width: 1200px; margin: auto; }

        /* CONTACT */
        .contact form { max-width: 600px; margin: auto; display: flex; flex-direction: column; gap: 1rem; }
        .contact input, .contact textarea { padding: 0.8rem; border-radius: 5px; border: 1px solid #ccc; width: 100%; }
        .contact button { background: #f39c12; padding: 1rem; border: none; color: #fff; font-weight: bold; border-radius: 5px; cursor: pointer; transition: background 0.3s; }
        .contact button:hover { background: #e67e22; }

        /* FOOTER */
        footer { background: #222; color: #fff; text-align: center; padding: 2rem; margin-top: 2rem; }
        footer a { color: #f39c12; margin: 0 0.5rem; transition: color 0.3s; }
        footer a:hover { color: #e67e22; }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <h1>Reghardt's Welding Business</h1>
        <nav>
            <a href="home.html">Home</a>
            <a href="about.html">About</a>
            <a href="services.html">Services</a>
            <a href="gallery.html">Gallery</a>
            <a href="testimonials.html">Testimonials</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <!-- CONTACT -->
    <section class="contact" id="contact">
        <h2>Contact Us</h2>
			<form action="https://formspree.io/f/xlgpyrbg" method="POST">
				<input type="text" name="name" placeholder="Your Name" required>
				<input type="email" name="email" placeholder="Your Email" required>
				<input type="text" name="service" placeholder="Service Needed" required>
				<textarea name="message" rows="5" placeholder="Project Details" required></textarea>
				<button type="submit">Send Request</button>
			</form>

    </section>

    <!-- FOOTER -->
    <footer>
        <p>&copy; 2026 Your Welding Business. All rights reserved.</p>
        <p>
            <a href="#">Facebook</a> |
            <a href="#">Instagram</a> |
            <a href="#">WhatsApp</a>
        </p>
    </footer>

</body>
</html>
